<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#070a0f" />
  <title>Tracking Despesas — Offline</title>
  <style>
    :root {
      --bg: #070a0f;
      --panel: #0f141c;
      --border: #273242;
      --text: #f3f5f8;
      --muted: #98a4b8;
      --accent: #8fb7ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      padding: 24px;
    }
    .card {
      width: min(100%, 520px);
      border: 1px solid var(--border);
      background: var(--panel);
      padding: 28px;
    }
    h1 { margin: 0 0 12px; font-size: 1.75rem; }
    p { margin: 0 0 10px; color: var(--muted); line-height: 1.5; }
    .badge {
      display: inline-block;
      margin-bottom: 16px;
      border: 1px solid var(--border);
      color: var(--accent);
      padding: 6px 10px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    button {
      margin-top: 18px;
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--text);
      padding: 10px 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">Modo offline</div>
    <h1>Sem conexão agora.</h1>
    <p>O app instalou e a interface básica continua disponível, mas a API não respondeu.</p>
    <p>Quando a conexão voltar, atualize para buscar os números mais recentes.</p>
    <button onclick="location.reload()">Tentar novamente</button>
  </div>
</body>
</html>
